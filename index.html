<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10 Дней с Любимой ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #333;
            text-align: center;
            padding: 15px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .login-screen, .main-site {
            display: none;
        }
        
        .login-screen.active, .main-site.active {
            display: block;
        }
        
        .login-box {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 350px;
            margin: 50px auto;
        }
        
        .login-box h2 {
            color: #d63384;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        
        .login-box input {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            border: 2px solid #ffb6c1;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .btn {
            background: #d63384;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            min-height: 50px;
        }
        
        .btn:active {
            background: #a82268;
        }
        
        h1 { 
            color: #d63384; 
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 500px;
            margin: 20px auto;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .card:active { 
            transform: scale(0.95); 
        }

        .card.active {
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 100%);
            animation: pulse 2s infinite;
        }

        .card.done {
            background: #d4edda;
        }
        
        .card.done::after { 
            content: "✅"; 
            font-size: 1.5rem; 
        }

        .card.locked {
            background: #e0e0e0;
            opacity: 0.7;
        }
        
        .card.locked::after {
            content: "🔒";
            font-size: 2rem;
        }

        .day-number { 
            font-size: 1.8rem; 
            font-weight: bold; 
            color: #d63384; 
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 10px;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 25px 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        
        .close-btn {
            position: absolute;
            top: 10px; 
            right: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            background: none;
            border: none;
            padding: 5px;
            min-width: 40px;
            min-height: 40px;
        }
        
        .task-title { 
            color: #d63384; 
            font-size: 1.3rem; 
            margin-bottom: 15px;
        }
        
        .task-desc { 
            font-size: 1rem; 
            line-height: 1.6; 
            margin-bottom: 20px; 
        }
        
        .drawing-container {
            display: none;
        }
        
        .drawing-container.active {
            display: block;
        }
        
        #drawingCanvas {
            border: 3px solid #d63384;
            border-radius: 10px;
            background: white;
            display: block;
            margin: 15px auto;
            max-width: 100%;
            cursor: crosshair;
            touch-action: none;
        }
        
        .drawing-tools {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }
        
        .tool-btn {
            background: #f0f0f0;
            border: 2px solid #ddd;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            min-height: 45px;
        }
        
        .tool-btn.active {
            background: #d63384;
            color: white;
            border-color: #d63384;
        }
        
        .color-picker {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
        }
        
        .brush-size {
            width: 100%;
            margin: 10px 0;
        }
        
        .comparison {
            display: none;
            margin-top: 20px;
        }
        
        .comparison.active {
            display: block;
        }
        
        .comparison h3 {
            color: #d63384;
            margin-bottom: 15px;
        }
        
        .comparison-images {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 15px 0;
        }
        
        .comparison-images img, .comparison-images canvas {
            width: 100%;
            border-radius: 10px;
            border: 2px solid #ddd;
        }
        
        .comparison-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }
        
        .secret-msg { 
            display: none; 
            background: #fff3cd; 
            padding: 15px; 
            border-radius: 10px; 
            margin-top: 15px;
            border-left: 5px solid #ffc107;
        }
        
        .secret-msg.active {
            display: block;
        }
        
        .status-msg {
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            font-size: 0.9rem;
            display: none;
        }
        
        .status-msg.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .status-msg.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .status-msg.loading {
            background: #fff3cd;
            color: #856404;
            display: block;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(214, 51, 132, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(214, 51, 132, 0); }
            100% { box-shadow: 0 0 0 0 rgba(214, 51, 132, 0); }
        }
        
        .logout-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            background: white;
            border: 2px solid #d63384;
            color: #d63384;
            padding: 8px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85rem;
            z-index: 50;
        }
    </style>
</head>
<body>

    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h2>❤️ Добро пожаловать ❤️</h2>
            <p>Введи дату начала наших отношений</p>
            <input type="date" id="dateInput">
            <button class="btn" onclick="checkDate()">Войти 💕</button>
        </div>
    </div>

    <div class="main-site" id="mainSite">
        <button class="logout-btn" onclick="logout()">Выйти</button>
        <h1>10 Дней до встречи ❤️</h1>

        <div class="grid" id="calendarGrid"></div>
    </div>

    <div class="modal" id="taskModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h2 class="task-title" id="modalTitle"></h2>
            <p class="task-desc" id="modalDesc"></p>
            
            <div class="drawing-container" id="drawingContainer">
                <canvas id="drawingCanvas" width="350" height="350"></canvas>
                
                <div class="drawing-tools">
                    <input type="color" class="color-picker" id="colorPicker" value="#d63384">
                    <button class="tool-btn" onclick="setTool('brush')">🖌️ Кисть</button>
                    <button class="tool-btn" onclick="setTool('eraser')">🧹 Ластик</button>
                    <button class="tool-btn" onclick="clearCanvas()">🗑️ Очистить</button>
                </div>
                
                <input type="range" class="brush-size" id="brushSize" min="2" max="20" value="5">
                <p style="font-size: 0.9rem; color: #666;">Размер кисти: <span id="brushSizeValue">5</span>px</p>
                
                <button class="btn" onclick="finishDrawing()">Готово! Показать результат 💖</button>
            </div>
            
            <div class="comparison" id="comparison">
                <h3>🎨 Сравним рисунки!</h3>
                <div class="comparison-images">
                    <div>
                        <canvas id="userDrawing" width="175" height="175"></canvas>
                        <p class="comparison-label">Твой рисунок</p>
                    </div>
                    <div>
                        <img id="myDrawing" src="my-drawing.png" alt="Мой рисунок">
                        <p class="comparison-label">Мой рисунок</p>
                    </div>
                </div>
                
                <div id="statusMsg" class="status-msg"></div>
                
                <button class="btn" onclick="sendToTelegram()" style="margin-top: 15px;">📤 Отправить рисунок в Telegram</button>
                <button class="btn" onclick="showSecret()" style="margin-top: 10px; background: #28a745;">Я выполнила! 💖</button>
            </div>
            
            <div class="secret-msg" id="secretMsg">
                <p id="secretText"></p>
            </div>
        </div>
    </div>

    <script>
        // ===== НАСТРОЙКИ TELEGRAM =====
        const TELEGRAM_BOT_TOKEN = 'ТВОЙ_ТОКЕН_БОТА'; // Вставь токен от BotFather
        const TELEGRAM_CHAT_ID = 'ТВОЙ_CHAT_ID'; // Вставь свой chat_id
        
        const correctDate = '2026-03-27';
        const startDate = new Date('2026-07-05');
        
        if (localStorage.getItem('loggedIn') === 'true') {
            showMainSite();
        }
        
        function checkDate() {
            const inputDate = document.getElementById('dateInput').value;
            if (inputDate === correctDate) {
                localStorage.setItem('loggedIn', 'true');
                showMainSite();
            }
        }
        
        function showMainSite() {
            document.getElementById('loginScreen').classList.remove('active');
            document.getElementById('mainSite').classList.add('active');
            initCalendar();
        }
        
        function logout() {
            localStorage.removeItem('loggedIn');
            location.reload();
        }
        
        const tasks = [
            { title: "День 1: МИНИ-ИГРА!", desc: "Поймай 67 сердечек за 2 минуты!", secret: "Ты поймала моё сердце! ❤️", isGame: true },
            { title: "День 2: 🎨 РИСОВАЛКА!", desc: "Нарисуй то, что я попрошу!", secret: "Ты рисуешь даже лучше меня! ❤️", isDrawing: true, drawingPrompt: "Нарисуй нас двоих вместе!" },
            { title: "День 3: Голос", desc: "Запиши голосовое сообщение, как ты скучаешь.", secret: "Твой голос — мой любимый звук." },
            { title: "День 4: Исследователь", desc: "Найди в городе что-то странное и сфоткай.", secret: "С тобой даже скучный город интересен." },
            { title: "День 5: Привет!", desc: "Сделай селфи из окна и скинь мне.", secret: "Ты самая красивая!" },
            { title: "День 6: Киновечер", desc: "Посмотри фильм и думай обо мне.", secret: "Моя главная роль — быть рядом с тобой." },
            { title: "День 7: Релакс", desc: "Сегодня день лени. Фоткай атмосферу.", secret: "Ты заслуживаешь отдыха." },
            { title: "День 8: Мечты", desc: "Скинь скриншот вещи, которую хочешь.", secret: "Для тебя мне ничего не жалко." },
            { title: "День 9: Музыка", desc: "Скинь 3 песни про нас.", secret: "Наш плейлист — саундтрек моей жизни." },
            { title: "День 10: ФИНАЛ!", desc: "Собирай вещи! Я уже бегу!", secret: "Я тебя ОЧЕНЬ ЛЮБЛЮ!" }
        ];

        function initCalendar() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            tasks.forEach((task, index) => {
                const dayDate = new Date(startDate);
                dayDate.setDate(startDate.getDate() + index);
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="day-number">${index + 1}</div><div>День</div>`;
                
                if (today < dayDate) {
                    card.classList.add('locked');
                } else if (today.getTime() === dayDate.getTime()) {
                    card.classList.add('active');
                    card.onclick = () => openModal(index);
                } else {
                    card.classList.add('done');
                    card.onclick = () => openModal(index);
                }
                
                grid.appendChild(card);
            });
        }

        function openModal(index) {
            document.getElementById('modalTitle').innerText = tasks[index].title;
            document.getElementById('modalDesc').innerText = tasks[index].desc;
            document.getElementById('secretText').innerText = tasks[index].secret;
            document.getElementById('secretMsg').classList.remove('active');
            document.getElementById('comparison').classList.remove('active');
            
            if (tasks[index].isDrawing) {
                document.getElementById('drawingContainer').classList.add('active');
                document.getElementById('modalDesc').innerText = tasks[index].drawingPrompt;
                initDrawing();
            } else {
                document.getElementById('drawingContainer').classList.remove('active');
            }
            
            document.getElementById('taskModal').classList.add('active');
            window.currentTaskIndex = index;
        }

        function closeModal() {
            document.getElementById('taskModal').classList.remove('active');
        }

        function showSecret() {
            document.getElementById('secretMsg').classList.add('active');
            const cards = document.querySelectorAll('.card');
            if (cards[window.currentTaskIndex]) {
                cards[window.currentTaskIndex].classList.remove('active');
                cards[window.currentTaskIndex].classList.add('done');
            }
        }

        // ===== TELEGRAM ОТПРАВКА =====
        function showStatus(message, type) {
            const statusEl = document.getElementById('statusMsg');
            statusEl.innerText = message;
            statusEl.className = 'status-msg ' + type;
        }

        async function sendToTelegram() {
            showStatus('⏳ Отправляю рисунок...', 'loading');
            
            try {
                // Конвертируем canvas в Blob
                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('chat_id', TELEGRAM_CHAT_ID);
                    formData.append('photo', blob, 'drawing.png');
                    formData.append('caption', '🎨 Рисунок от любимой за День 2! ❤️');
                    
                    const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    
                    if (result.ok) {
                        showStatus('✅ Рисунок отправлен в Telegram!', 'success');
                        
                        // Также отправим текстовое уведомление
                        const text = `🎉 Девушка выполнила задание День 2!\n📅 ${new Date().toLocaleString('ru-RU')}`;
                        
                        await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                chat_id: TELEGRAM_CHAT_ID,
                                text: text
                            })
                        });
                    } else {
                        showStatus('❌ Ошибка отправки: ' + result.description, 'error');
                    }
                }, 'image/png');
            } catch (error) {
                showStatus('❌ Ошибка: ' + error.message, 'error');
            }
        }

        // ===== РИСОВАЛКА =====
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let currentTool = 'brush';
        let lastX = 0;
        let lastY = 0;

        function initDrawing() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function startDraw(e) {
            e.preventDefault();
            isDrawing = true;
            const pos = getPos(e);
            lastX = pos.x;
            lastY = pos.y;
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            
            const pos = getPos(e);
            const brushSize = document.getElementById('brushSize').value;
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            
            if (currentTool === 'eraser') {
                ctx.strokeStyle = 'white';
                ctx.lineWidth = brushSize * 2;
            } else {
                ctx.strokeStyle = document.getElementById('colorPicker').value;
                ctx.lineWidth = brushSize;
            }
            
            ctx.stroke();
            lastX = pos.x;
            lastY = pos.y;
        }

        function stopDraw() {
            isDrawing = false;
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseout', stopDraw);
        
        canvas.addEventListener('touchstart', startDraw, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDraw);

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function clearCanvas() {
            if (confirm('Очистить рисунок?')) {
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        document.getElementById('brushSize').addEventListener('input', (e) => {
            document.getElementById('brushSizeValue').innerText = e.target.value;
        });

        function finishDrawing() {
            const userCanvas = document.getElementById('userDrawing');
            const userCtx = userCanvas.getContext('2d');
            userCtx.drawImage(canvas, 0, 0, 175, 175);
            
            document.getElementById('drawingContainer').classList.remove('active');
            document.getElementById('comparison').classList.add('active');
        }
    </script>
</body>
</html>
