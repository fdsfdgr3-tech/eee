<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Я ТЕБЯ ЛЮБЛЮ ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400;500&display=swap');
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #333;
            text-align: center;
            padding: 10px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .login-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }
        
        .login-box {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 350px;
            width: 100%;
        }
        
        .login-box h2 { color: #d63384; margin-bottom: 15px; font-size: 1.5rem; }
        .login-box p { color: #666; margin-bottom: 20px; }
        
        .login-box input {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            border: 2px solid #ffb6c1;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .btn {
            background: #d63384;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            min-height: 50px;
        }
        .btn:active { background: #a82268; }
        
        .error-msg {
            color: #dc3545;
            margin-top: 10px;
            display: none;
            font-weight: bold;
        }
        
        .main-site { display: none; }
        
        .surprise-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 20px;
        }
        
        .surprise-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 40px 60px;
            border-radius: 30px;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(245, 87, 108, 0.5);
            transition: all 0.3s;
            min-width: 300px;
            animation: pulse 2s infinite;
        }
        
        .surprise-btn:active {
            transform: scale(0.95);
        }
        
        .surprise-message {
            display: none;
            background: white;
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
            animation: messageAppear 0.8s ease-out;
        }
        
        .surprise-message.active {
            display: block;
        }
        
        .surprise-message h1 {
            color: #d63384;
            font-size: 1.8rem;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        
        .surprise-message .heart {
            font-size: 4rem;
            display: block;
            margin-top: 20px;
            animation: heartbeat 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 15px 40px rgba(245, 87, 108, 0.5); }
            50% { box-shadow: 0 15px 60px rgba(245, 87, 108, 0.8); }
            100% { box-shadow: 0 15px 40px rgba(245, 87, 108, 0.5); }
        }
        
        @keyframes messageAppear {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h2>❤️ Добро пожаловать ❤️</h2>
            <p>Введи дату начала наших отношений</p>
            <input type="date" id="dateInput">
            <button class="btn" onclick="checkDate()">Войти 💕</button>
            <p class="error-msg" id="errorMsg">Неверная дата! Попробуй ещё раз 😔</p>
        </div>
    </div>

    <div class="main-site" id="mainSite">
        <div class="surprise-container">
            <button class="surprise-btn" id="surpriseBtn" onclick="showSurprise()">🎁 СЮРПРИЗ 🎁</button>
            
            <div class="surprise-message" id="surpriseMessage">
                <h1>Выходи на улицу зайка я тебя жду</h1>
                <span class="heart">❤️</span>
            </div>
        </div>
    </div>

    <script>
        const correctDate = '2026-03-27';
        
        if (localStorage.getItem('loggedIn') === 'true') {
            showMainSite();
        }
        
        function checkDate() {
            const inputDate = document.getElementById('dateInput').value;
            if (inputDate === correctDate) {
                localStorage.setItem('loggedIn', 'true');
                showMainSite();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('dateInput').value = '';
                setTimeout(() => { document.getElementById('errorMsg').style.display = 'none'; }, 3000);
            }
        }
        
        function showMainSite() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainSite').style.display = 'block';
        }
        
        function showSurprise() {
            document.getElementById('surpriseBtn').style.display = 'none';
            document.getElementById('surpriseMessage').classList.add('active');
        }
    </script>
</body>
</html>
